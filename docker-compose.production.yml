version: '3.8'

services:
  db:
    image: postgres:13
    container_name: db
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: ${DOCKERHUB_USERNAME}/kittygram_backend:latest
    container_name: backend
    env_file:
      - .env
    volumes:
      - static:/vol/static
      - media:/vol/media
    depends_on:
      - db
    restart: always

  frontend:
    image: ${DOCKERHUB_USERNAME}/kittygram_frontend:latest
    container_name: frontend
    volumes:
      - static:/vol/static
    depends_on:
      - backend
    restart: always

  gateway:
    image: ${DOCKERHUB_USERNAME}/kittygram_gateway:latest
    container_name: gateway
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - static:/vol/static
      - media:/vol/media
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  static:
  media:
  pg_data:

