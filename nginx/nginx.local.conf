server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        alias /vol/media/;
    }

    location /static/ {
        alias /vol/static/;
    }

    # Фронтенд собран с PUBLIC_URL=/kittygram — ассеты лежат по /kittygram/static/...
    location = /kittygram {
        root /vol/static;
        try_files /kittygram/index.html =404;
        types { }
        default_type text/html;
    }

    location /kittygram/ {
        alias /vol/static/kittygram/;
        try_files $uri $uri/ /kittygram/index.html;
        index index.html;
    }

    # Корень редиректит на /kittygram/
    location = / {
        return 302 /kittygram/;
    }
}