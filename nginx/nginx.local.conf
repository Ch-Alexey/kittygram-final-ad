server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /kittygram/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kittygram/admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kittygram/media/ {
        alias /vol/media/;
    }

    # Ищем статику фронта там, где она лежит
    location /kittygram/static/ {
        alias /vol/static/kittygram/static/;
    }

    location /kittygram/static/admin/ {
        alias /vol/static/admin/;
    }

    location /kittygram/static/rest_framework/ {
        alias /vol/static/rest_framework/;
    }

    # Фронтенд собран с PUBLIC_URL=/kittygram — ассеты лежат по /kittygram/static/...
    location = /kittygram {
        root /vol/static;
        try_files /kittygram/index.html =404;
        types { }
        default_type text/html;
    }

    location /kittygram/ {
        alias /vol/static/kittygram/;
        try_files $uri $uri/ /kittygram/index.html;
        index index.html;
    }
}
